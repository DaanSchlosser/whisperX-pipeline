name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      # pyproject.toml pins pyright to resolve imports from `./.venv`, so CI
      # installs into a venv at that same path for parity with local dev.
      - name: Create venv and install project + tooling
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -e .[dev]

      - name: Ruff lint
        run: .venv/bin/ruff check .

      - name: Ruff format check
        run: .venv/bin/ruff format --check .

      - name: Mypy type check
        run: .venv/bin/mypy .

      - name: Pyright strict type check
        run: .venv/bin/pyright

